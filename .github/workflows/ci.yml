name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: python:${{ matrix.python-version }}-bookworm
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y git curl

      - name: Verify workspace
        run: |
          test -f pyproject.toml
          python --version
          git status --short

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run main test suite
        run: python -m pytest -q

      - name: Run reproducible property tests
        run: python -m pytest tests/test_property.py -q --hypothesis-seed=0

      - name: Verify graph snapshots are clean
        run: |
          python -m pytest tests/test_core.py -q -k snapshot
          git diff --exit-code -- tests/snapshots

      - name: Build package
        run: python -m build --wheel
